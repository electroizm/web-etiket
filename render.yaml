# Render.com — Infrastructure-as-Code
# https://render.com/docs/infrastructure-as-code
#
# Kullanım: Render Dashboard → New + → Blueprint → repo'yu bağla.
# Render bu dosyayı okur, servisi otomatik kurar; sadece sync:false olan
# secret'ları Dashboard'dan elle girersin.

services:
  - type: web
    name: web-etiket           # URL: https://web-etiket.onrender.com
    runtime: python            # Render IaC schema 2024+ ('env' yerine 'runtime')
    plan: free                 # 750 saat/ay (boş bekleyince uyur, ilk istekte uyanır)
    region: frankfurt          # TR'ye en yakın
    branch: main               # main'e push → otomatik deploy
    buildCommand: "./build.sh"
    # --timeout 120: toplu etiket PDF üretimi (60+ sayfa) gunicorn'un
    # varsayılan 30 sn'lik worker timeout'unu aşabiliyor.
    startCommand: "gunicorn etiket_project.wsgi:application --timeout 120"
    healthCheckPath: /accounts/login/   # 200 dönmesi gerekli, login zaten public

    envVars:
      # Python sürümü — requirements.txt'teki wheel'lerle uyumlu
      - key: PYTHON_VERSION
        value: "3.13.0"

      # ─── Django ────────────────────────────────────────────────────
      - key: DJANGO_SECRET_KEY
        generateValue: true                # Render rastgele üretir, kalıcı
      - key: DJANGO_DEBUG
        value: "False"

      # ALLOWED_HOSTS — Render her servise <name>.onrender.com verir;
      # bu hostname'i otomatik aynı env var'a kopyala.
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          name: web-etiket
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

      # CSRF: HTTPS origin tam URL ister. Aşağıyı Dashboard'dan elle gir:
      #   https://web-etiket.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false

      # ─── Supabase (ZORUNLU — Dashboard'dan elle gir) ───────────────
      - key: SUPABASE_URL
        sync: false                        # https://xxxxx.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false                        # eyJ... (anon public)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false                        # eyJ... (service role · gizli)
      - key: SUPABASE_JWT_JWK
        sync: false                        # JWK JSON tek satır (modern ES256)

      # ─── Scraper / SQLAlchemy direct connection ────────────────────
      - key: DATABASE_URL
        sync: false                        # postgresql+psycopg2://...pooler:5432/postgres
      - key: SCRAPER_CONCURRENCY
        value: "2"
      - key: SCRAPER_RATE_DELAY_MIN
        value: "1.0"
      - key: SCRAPER_RATE_DELAY_MAX
        value: "3.0"
      - key: SCRAPER_SKIP_KATEGORILER
        value: "Doğtaş Home"

      # ─── Sentry hata izleme (Dashboard'dan elle gir; boş = devre dışı) ─
      - key: SENTRY_DSN
        sync: false
