{% comment %}
Ayarlar sayfası sol sidebar — sekme listesi.
Kullanım (parent template'te): include "dashboard/_ayarlar_sidebar.html"
active_tab değişkeni context'ten gelir ('slogan' / 'yerli_uretim').
{% endcomment %}
<nav class="ayarlar-sidebar glass" aria-label="Ayarlar sekmeleri">
  <a href="{% url 'dashboard:ayarlar_slogan' %}"
     class="ayarlar-tab{% if active_tab == 'slogan' %} ayarlar-tab--active{% endif %}">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span>Slogan</span>
  </a>
  <a href="{% url 'dashboard:ayarlar_yerli_uretim' %}"
     class="ayarlar-tab{% if active_tab == 'yerli_uretim' %} ayarlar-tab--active{% endif %}">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20 7L9 18l-5-5"/>
    </svg>
    <span>Yerli Üretim</span>
  </a>
</nav>
