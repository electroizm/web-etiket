{% comment %}
Ortak üst bar — tüm panel sayfalarında include edilir.
Sağdaki kullanıcı linki profile.js tarafından #topbar-user ile güncellenir.
Çıkış butonu her sayfanın kendi script'inde logout-btn id'siyle bağlanır.
{% endcomment %}
<header class="topbar">
  <a href="{% url 'dashboard:home' %}" class="brand-link" aria-label="Ana sayfa">
    <span class="brand-mark brand-mark--sm" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="tbgrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5048e5"/><stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <rect x="8" y="6" width="40" height="52" rx="8" fill="url(#tbgrad)" opacity="0.10"/>
        <rect x="8" y="6" width="40" height="52" rx="8" stroke="url(#tbgrad)" stroke-width="2"/>
        <g stroke="url(#tbgrad)" stroke-width="2" stroke-linecap="round">
          <line x1="16" y1="22" x2="16" y2="42"/><line x1="20" y1="22" x2="20" y2="42"/>
          <line x1="24" y1="22" x2="24" y2="42"/><line x1="28" y1="22" x2="28" y2="42"/>
          <line x1="32" y1="22" x2="32" y2="42"/><line x1="36" y1="22" x2="36" y2="42"/>
          <line x1="40" y1="22" x2="40" y2="42"/>
        </g>
      </svg>
    </span>
    <span class="topbar__title">Güneşler Elektronik</span>
  </a>
  <div class="topbar__user">
    <a href="{% url 'accounts:profile' %}" class="user-link" id="topbar-user"
       data-email="{{ request.supabase_user.email }}"
       title="{{ request.supabase_user.email }}">{{ request.supabase_user.display_name }}</a>
    <button type="button" class="btn-ghost btn-ghost--sm" id="logout-btn" aria-label="Çıkış yap">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 17l5-5-5-5"/><path d="M20 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      </svg>
      <span class="topbar__cikis-yazi">Çıkış</span>
    </button>
  </div>
</header>
